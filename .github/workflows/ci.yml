name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "./packages/*" build

      - name: Type-check
        run: pnpm -r lint

      - name: Test (with coverage thresholds)
        run: pnpm -r test:coverage

      - name: Zod leak gate
        run: pnpm -r check-zod

      - name: Standards conformance gate
        run: node scripts/check-standards.mjs

  consumer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter "./packages/*" build

      - name: Consumer smoke test (tarball install, ESM+CJS+types, Zod-leak gate)
        run: node scripts/smoke-consumer.mjs

  # R-1 canary (non-blocking): do the structural types in km-shared still
  # compile against zod@latest? A red run here is an early warning that a new
  # Zod release changed `_zod` internals — not a broken build.
  canary-zod:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compile structural types against zod@latest
        run: node scripts/canary-zod.mjs
