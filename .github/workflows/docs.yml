name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'apps/docs/**'
      - 'packages/*/src/**'
      - 'typedoc.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages (needed for TypeDoc entry-point resolution)
        run: pnpm --filter './packages/*' build

      - name: Generate API docs via TypeDoc
        run: |
          npm install -g typedoc@^0.28.0 typedoc-plugin-markdown@^4.12.0
          typedoc
        # Installs compatible versions globally (ephemeral in CI) since lockfile
        # resolves typedoc@0.27.9 + typedoc-plugin-markdown@4.12.0 which are
        # incompatible (plugin 4.12 needs typedoc 0.28).

      - name: Build Astro docs site
        working-directory: apps/docs
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
